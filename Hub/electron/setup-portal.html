<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoWall Agent Setup - LedShow</title>
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: var(--primary);
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin: 0 0 16px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--muted);
        }

        input,
        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-top: 8px;
        }

        .btn:hover {
            background: #1e293b;
            border-color: var(--primary);
        }

        .btn svg {
            color: #a855f7;
            /* Purple icon */
            width: 18px;
            height: 18px;
        }

        .action-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .config-note {
            font-size: 11px;
            margin-top: 12px;
            color: var(--muted);
            text-align: center;
        }

        .steps {
            font-size: 13px;
            color: var(--muted);
        }

        .steps ol {
            padding-left: 20px;
        }

        .steps li {
            margin-bottom: 8px;
        }

        .steps a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .steps a:hover {
            border-bottom-color: var(--primary);
        }

        .steps a:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>VideoWall Agent Setup</h1>
        <p>Configureer en download de agent software voor je externe computer.</p>

        <div class="section">
            <h2>1. Configuratie</h2>
            <div class="field">
                <label>Agent Naam</label>
                <input type="text" id="agentName" placeholder="Bijv. VideoWall-Zaal-A" value="VideoWall-Agent">
            </div>
            <div class="grid-2">
                <div class="field">
                    <label>Model</label>
                    <select id="agentModel" title="Selecteer VideoWall Model">
                        <option value="4-screen">4 Schermen</option>
                        <option value="9-screen">9 Schermen</option>
                    </select>
                </div>
                <div class="field">
                    <label>Layout</label>
                    <select id="agentLayout" title="Selecteer Hardware Layout">
                        <!-- Options filled by JS -->
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="field">
                    <label>Oriëntatie</label>
                    <select id="agentOrientation" title="Selecteer Scherm Oriëntatie">
                        <option value="landscape">Landscape</option>
                        <option value="portrait">Portrait</option>
                    </select>
                </div>
                <div class="field">
                    <label>Platform</label>
                    <select id="agentPlatform" title="Selecteer Besturingssysteem">
                        <option value="windows">Windows</option>
                        <option value="linux">Linux / Raspberry Pi</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>2. Download & Start</h2>
            <div class="action-container">
                <a href="/agent-package" class="btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Download Agent (.zip)
                </a>
                <button onclick="downloadScript()" class="btn" id="btnGenerateScript">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                    Genereer Start Script (.bat)
                </button>
            </div>
            <p class="config-note" id="configNote">
                De bovenstaande configuratie wordt direct in het <strong>start.bat</strong> bestand geplaatst als
                omgevingsvariabelen.
            </p>
        </div>

        <div class="section">
            <h2>3. Installatie Instructies</h2>
            <div class="steps" id="installSteps">
                <!-- Filled by JS based on platform -->
            </div>
        </div>
    </div>

    <script>
        const LAYOUTS_4 = ['2x2', '1x1', '1x2', '1x3', '1x4', '4x1', '3x1', '2x1'];
        const LAYOUTS_9 = ['1x1', '1x2', '1x3', '1x4', '2x1', '2x2', '2x3', '2x4', '3x1', '3x2', '3x3', '4x1', '4x2'];

        const modelSelect = document.getElementById('agentModel');
        const layoutSelect = document.getElementById('agentLayout');
        const platformSelect = document.getElementById('agentPlatform');
        const btnGenerateScript = document.getElementById('btnGenerateScript');
        const configNote = document.getElementById('configNote');
        const installSteps = document.getElementById('installSteps');

        function updateLayouts() {
            const model = modelSelect.value;
            const layouts = model === '4-screen' ? LAYOUTS_4 : LAYOUTS_9;
            layoutSelect.innerHTML = layouts.map(l => `<option value="${l}">${l}</option>`).join('');
        }

        function updatePlatformUI() {
            const isWindows = platformSelect.value === 'windows';
            const scriptName = isWindows ? 'start.bat' : 'start.sh';
            const scriptExt = isWindows ? '.bat' : '.sh';

            btnGenerateScript.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                </svg>
                Genereer Start Script (${scriptExt})
            `;

            configNote.innerHTML = `De bovenstaande configuratie wordt direct in het <strong>${scriptName}</strong> bestand geplaatst als omgevingsvariabelen.`;

            if (isWindows) {
                installSteps.innerHTML = `
                    <ol>
                        <li>
                            <strong>Stap 1: Node.js installeren</strong><br>
                            Download en installeer <a href="https://nodejs.org/dist/v22.14.0/node-v22.14.0-x64.msi"
                                target="_blank" rel="noopener">Node.js (LTS v22)</a>.
                            Dit is nodig om de agent software te kunnen draaien.
                        </li>
                        <li>
                            <strong>Stap 2: Google Chrome installeren</strong><br>
                            Zorg dat <a href="https://www.google.com/intl/nl/chrome/" target="_blank" rel="noopener">Google Chrome</a>,
                            Microsoft Edge, of Chromium geïnstalleerd is.
                            De agent gebruikt de browser voor videoweergave.
                        </li>
                        <li>
                            <strong>Stap 3: Agent uitpakken</strong><br>
                            Pak de <strong>VideoWall-agent-v1.1.0.zip</strong> uit naar een map op je computer (bijvoorbeeld
                            <code>C:\\LedShow-Agent\\</code>).
                        </li>
                        <li>
                            <strong>Stap 4: Installeren</strong><br>
                            Dubbelklik op <strong>install.bat</strong> in de uitgepakte map. Dit installeert de benodigde afhankelijkheden.
                        </li>
                        <li>
                            <strong>Stap 5: Start script plaatsen</strong><br>
                            Download het <strong>start.bat</strong> bestand hierboven en plaats deze <u>direct</u> in de map
                            waar ook <code>package.json</code> en <code>dist/</code> staan.
                        </li>
                        <li>
                            <strong>Stap 6: Starten!</strong><br>
                            Dubbelklik op <strong>start.bat</strong>. Er opent een zwart venster. De eerste keer kan Windows
                            vragen om netwerktoegang; sta dit toe.
                        </li>
                        <li>
                            <strong>Stap 7: Controle</strong><br>
                            Ga op de computer waar de agent draait naar <a href="http://localhost:3003" target="_blank"
                                rel="noopener">http://localhost:3003</a> om de status te zien.
                            Het output scherm is te vinden op <a href="http://localhost:3003/output" target="_blank"
                                rel="noopener">http://localhost:3003/output</a>.
                        </li>
                    </ol>
                `;
            } else {
                installSteps.innerHTML = `
                    <ol>
                        <li>
                            <strong>Stap 1: Node.js installeren</strong><br>
                            Installeer Node.js v18 of hoger via je pakketbeheerder of
                            <a href="https://nodejs.org/" target="_blank" rel="noopener">nodejs.org</a>.
                        </li>
                        <li>
                            <strong>Stap 2: Chromium installeren</strong><br>
                            Installeer Chromium of Google Chrome:<br>
                            <code>sudo apt install chromium-browser</code>
                        </li>
                        <li>
                            <strong>Stap 3: Agent uitpakken</strong><br>
                            <code>unzip VideoWall-agent-v1.1.0.zip -d ~/VideoWall-agent</code><br>
                            <code>cd ~/VideoWall-agent</code>
                        </li>
                        <li>
                            <strong>Stap 4: Installeren</strong><br>
                            <code>chmod +x install.sh start.sh</code><br>
                            <code>./install.sh</code>
                        </li>
                        <li>
                            <strong>Stap 5: Start script plaatsen</strong><br>
                            Download het <strong>start.sh</strong> bestand hierboven en plaats deze in de agent map
                            (naast <code>package.json</code>). Maak uitvoerbaar met <code>chmod +x start.sh</code>.
                        </li>
                        <li>
                            <strong>Stap 6: Starten!</strong><br>
                            <code>./start.sh</code>
                        </li>
                        <li>
                            <strong>Stap 7: Controle</strong><br>
                            Ga naar <a href="http://localhost:3003" target="_blank"
                                rel="noopener">http://localhost:3003</a> om de status te zien.
                            Het output scherm is te vinden op <a href="http://localhost:3003/output" target="_blank"
                                rel="noopener">http://localhost:3003/output</a>.
                        </li>
                    </ol>
                `;
            }
        }

        modelSelect.addEventListener('change', updateLayouts);
        platformSelect.addEventListener('change', updatePlatformUI);
        updateLayouts();
        updatePlatformUI();

        function generateWindowsBat(name, model, layout, orientation) {
            return `@echo off\r\ntitle LedShow VideoWall Agent - ${name}\r\nREM ============================================\r\nREM  LedShow VideoWall Agent - Start Script\r\nREM  Gegenereerd door de LedShow Hub\r\nREM ============================================\r\nREM\r\nREM  Configuratie (aangepast per installatie):\r\nset AGENT_NAME=${name}\r\nset AGENT_MODEL=${model}\r\nset AGENT_LAYOUT=${layout}\r\nset AGENT_ORIENTATION=${orientation}\r\nset AGENT_PORT=3003\r\n\r\necho --- LedShow VideoWall Agent ---\r\necho Naam:        %AGENT_NAME%\r\necho Model:       %AGENT_MODEL%\r\necho Layout:      %AGENT_LAYOUT%\r\necho Orientatie:  %AGENT_ORIENTATION%\r\necho Poort:       %AGENT_PORT%\r\necho ---\r\n\r\n:: Check Node.js\r\nnode -v >nul 2>&1\r\nif %ERRORLEVEL% NEQ 0 (\r\n    echo [FOUT] Node.js is niet gevonden. Installeer Node.js en probeer het opnieuw.\r\n    pause\r\n    exit /b\r\n)\r\n\r\n:: Check compiled files\r\nif not exist "dist\\index.js" (\r\n    echo [FOUT] De gecompileerde software ^(dist/index.js^) ontbreekt.\r\n    echo Zorg dat je de volledige zip hebt uitgepakt.\r\n    pause\r\n    exit /b\r\n)\r\n\r\n:: Check dependencies\r\nif not exist "node_modules" (\r\n    echo [INFO] Afhankelijkheden ontbreken. Voer eerst install.bat uit.\r\n    pause\r\n    exit /b\r\n)\r\n\r\necho Starting VideoWall Agent: %AGENT_NAME% (%AGENT_MODEL% %AGENT_LAYOUT%)\r\nnode dist/index.js\r\nif %ERRORLEVEL% NEQ 0 (\r\n    echo Agent is onverwacht gestopt ^(Error Code: %ERRORLEVEL%^).\r\n    pause\r\n)\r\n`;
        }

        function generateLinuxSh(name, model, layout, orientation) {
            return `#!/bin/bash\n# ============================================\n#  LedShow VideoWall Agent - Start Script\n#  Gegenereerd door de LedShow Hub\n# ============================================\n\n# Configuratie (aangepast per installatie):\nexport AGENT_NAME="${name}"\nexport AGENT_MODEL="${model}"\nexport AGENT_LAYOUT="${layout}"\nexport AGENT_ORIENTATION="${orientation}"\nexport AGENT_PORT="3003"\n\necho "--- LedShow VideoWall Agent ---"\necho "Naam:        $AGENT_NAME"\necho "Model:       $AGENT_MODEL"\necho "Layout:      $AGENT_LAYOUT"\necho "Orientatie:  $AGENT_ORIENTATION"\necho "Poort:       $AGENT_PORT"\necho "---"\n\n# Check Node.js\nif ! command -v node &> /dev/null; then\n    echo "[FOUT] Node.js is niet gevonden."\n    exit 1\nfi\n\n# Check compiled files\nif [ ! -f "dist/index.js" ]; then\n    echo "[FOUT] dist/index.js ontbreekt. Pak de volledige zip uit."\n    exit 1\nfi\n\n# Check dependencies\nif [ ! -d "node_modules" ]; then\n    echo "[INFO] Afhankelijkheden ontbreken. Voer eerst ./install.sh uit."\n    exit 1\nfi\n\necho "Starting VideoWall Agent: $AGENT_NAME ($AGENT_MODEL $AGENT_LAYOUT)"\nnode dist/index.js\n`;
        }

        function downloadScript() {
            const name = document.getElementById('agentName').value;
            const model = document.getElementById('agentModel').value;
            const layout = document.getElementById('agentLayout').value;
            const orientation = document.getElementById('agentOrientation').value;
            const platform = document.getElementById('agentPlatform').value;

            let content, filename;

            if (platform === 'windows') {
                content = generateWindowsBat(name, model, layout, orientation);
                filename = 'start.bat';
            } else {
                content = generateLinuxSh(name, model, layout, orientation);
                filename = 'start.sh';
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
